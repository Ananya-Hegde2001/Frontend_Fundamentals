<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h2>Registration form</h2>

<p class="note">
Free delegate passes are not applicable for cybersecurity solution providers,
technology vendors, security service providers or consulting firms.
</p>

<form id="form">

<div class="grid">

<div class="field">
<label>First Name</label>
<input type="text" placeholder="John" id="fname">
</div>

<div class="field">
<label>Last Name</label>
<input type="text" placeholder="Doe">
</div>

<div class="field">
<label>Official Email ID</label>
<input type="email" placeholder="john.doe@yourcompany.com" id="email">
</div>

<div class="field">
<label>Company Name</label>
<input type="text" placeholder="ABC Corp">
</div>

<div class="field">
<label>Job Role</label>
<input type="text" placeholder="Marketing Manager">
</div>

<div class="field">
<label>Country</label>
<select>
<option>Select your Country</option>
<option>India</option>
<option>USA</option>
<option>UK</option>
<option>Australia</option>
</select>
</div>

<div class="field">
<label>Phone Number</label>

<div class="phone-box">
<span>+91</span>
<input type="tel" placeholder="9876543210" id="phone">
</div>

</div>

<div class="field">
<label>Industry</label>
<select>
<option>Select your Industry</option>
<option>IT</option>
<option>Finance</option>
<option>Healthcare</option>
<option>Education</option>
</select>
</div>

<div class="field full">
<label>LinkedIn Profile Link</label>
<input type="url" placeholder="https://linkedin.com/in/your-profile">
</div>

</div>

<button type="submit">Submit</button>

</form>

</div>

<script src="script.js"></script>

</body>
</html>
